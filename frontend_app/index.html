<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Mobility App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; overflow: hidden; }
        #map { height: calc(100vh - 130px); width: 100%; z-index: 10; }
        
        .bottom-sheet {
            transform: translateY(120%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bottom-sheet.open { transform: translateY(0); }

        #toast-container {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px;
        }
        .toast {
            background: #333; color: white; padding: 12px 20px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0; transition: opacity 0.3s ease;
            text-align: center; font-weight: 500;
        }
        .user-location-icon {
            background: #2563eb; border: 3px white solid; border-radius: 50%;
            box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <header class="bg-blue-600 text-white p-4 shadow-md z-20 flex justify-between items-center">
        <div class="text-xl font-bold tracking-tight">
            <i class="fa-solid fa-bolt mr-2 text-yellow-300"></i>Mobility
        </div>
        <div class="flex items-center gap-2">
            <button type="button" onclick="mostraMeteo()" title="Meteo e consiglio mezzo" class="bg-blue-700 w-9 h-9 rounded-full flex items-center justify-center hover:bg-blue-800 transition">
                <i class="fa-solid fa-cloud-sun"></i>
            </button>
            <button type="button" onclick="apriChat()" title="Assistenza" class="bg-blue-700 w-9 h-9 rounded-full flex items-center justify-center hover:bg-blue-800 transition">
                <i class="fa-solid fa-headset"></i>
            </button>
            <div class="bg-blue-700 px-3 py-1 rounded-full text-sm font-semibold">
                <i class="fa-solid fa-user mr-1"></i> Utente 1
            </div>
        </div>
    </header>

    <div id="toast-container"></div>

    <main class="flex-grow relative">
        <div id="map"></div>
        <button type="button" onclick="centerMapOnUser()" class="absolute bottom-6 right-4 z-[400] bg-white p-3 rounded-full shadow-lg border border-gray-200 text-blue-600 hover:bg-gray-50">
            <i class="fa-solid fa-location-crosshairs text-xl"></i>
        </button>
    </main>

    <div id="vehicle-modal" class="bottom-sheet fixed bottom-[60px] left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-[500] p-6 pb-8 border-t border-gray-100">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5"></div>
        
        <div class="flex justify-between items-start mb-2">
            <div>
                <h2 id="modal-title" class="text-2xl font-bold text-gray-800">Mezzo #1</h2>
                <p id="modal-type" class="text-gray-500 font-medium">Veicolo</p>
            </div>
            <div class="flex flex-col items-end">
                <div class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-bold flex items-center mb-1">
                    <i class="fa-solid fa-battery-three-quarters mr-1"></i> <span id="modal-battery">85%</span>
                </div>
                <span id="modal-autonomy" class="text-xs font-bold text-gray-400"><i class="fa-solid fa-road mr-1"></i>~25 km</span>
            </div>
        </div>

        <div class="mb-4 bg-gray-50 p-3 rounded-xl border border-gray-200">
            <p class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2"><i class="fa-solid fa-calculator mr-1"></i> Preventivo Corsa</p>
            <div class="flex gap-2">
                <input type="text" id="destinazione-input" placeholder="Es. Via Roma, Milano" class="flex-1 border border-gray-300 py-2 px-3 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                <button type="button" onclick="calcolaPreventivoDaIndirizzo()" class="bg-blue-100 text-blue-700 px-3 rounded-lg font-bold hover:bg-blue-200 transition"><i class="fa-solid fa-search"></i></button>
            </div>
            <div id="risultato-preventivo" class="mt-2 text-sm text-blue-700 font-medium hidden bg-blue-50 p-2 rounded">
                </div>
            <button type="button" onclick="mostraPercorso()" class="mt-2 w-full bg-indigo-100 text-indigo-700 font-bold py-2 rounded-lg text-sm hover:bg-indigo-200 transition">
                <i class="fa-solid fa-route mr-1"></i> Mostra percorso più breve
            </button>
        </div>

        <div class="mb-2 flex gap-2">
            <input type="text" id="codice-sblocco-input" placeholder="Codice Sblocco (es. 000001)" maxlength="6" class="flex-1 text-center border-2 border-gray-200 py-3 px-4 rounded-xl text-lg font-bold tracking-widest uppercase focus:outline-none focus:border-blue-500 transition">
            <button type="button" onclick="avviaScansioneQR()" title="Scansiona QR Code" class="bg-gray-800 text-white px-4 rounded-xl hover:bg-black transition">
                <i class="fa-solid fa-qrcode text-lg"></i>
            </button>
        </div>
        <div id="qr-reader" class="mb-2 hidden rounded-xl overflow-hidden"></div>

        <div class="flex gap-4 mt-2">
            <button type="button" onclick="event.preventDefault(); prenotaMezzo()" class="flex-1 bg-gray-100 text-gray-800 font-bold py-3 px-4 rounded-xl shadow-sm border border-gray-200 active:bg-gray-200 transition">
                <i class="fa-solid fa-calendar-check mr-2"></i>Prenota
            </button>
            <button type="button" onclick="event.preventDefault(); sbloccaMezzo()" class="flex-1 bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-md active:bg-blue-700 transition">
                <i class="fa-solid fa-unlock-keyhole mr-2"></i>Sblocca
            </button>
        </div>
        <button type="button" onclick="event.preventDefault(); closeModal('vehicle-modal')" class="w-full mt-4 text-gray-400 font-medium py-2 active:text-gray-600">Annulla</button>
    </div>

    <div id="active-ride-modal" class="bottom-sheet fixed bottom-[60px] left-0 right-0 bg-white rounded-t-3xl shadow-[0_-15px_25px_-5px_rgba(0,0,0,0.15)] z-[600] p-6 pb-8 border-t-4 border-blue-500">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-blue-600 animate-pulse"><i class="fa-solid fa-route mr-2"></i>Corsa in corso</h2>
                <p class="text-gray-500 text-sm mt-1">Guida con prudenza!</p>
            </div>
            <div class="text-right">
                <div class="text-2xl font-black text-gray-800" id="ride-cost">0.00€</div>
                <div class="text-sm font-semibold text-gray-400" id="ride-time">0 min</div>
            </div>
        </div>

        <div class="mb-3">
            <input type="text" id="codice-promo-input" placeholder="Codice sconto (opzionale)" class="w-full border border-gray-300 py-2 px-3 rounded-lg text-sm uppercase tracking-wide focus:outline-none focus:border-green-500">
        </div>

        <div class="flex gap-4">
            <button type="button" id="btn-pausa" onclick="event.preventDefault(); togglePausa()" class="flex-1 bg-yellow-400 text-yellow-900 font-bold py-3 px-4 rounded-xl shadow-md active:bg-yellow-500 transition">
                <i class="fa-solid fa-pause mr-2" id="icon-pausa"></i><span id="text-pausa">Pausa</span>
            </button>
            <button type="button" onclick="event.preventDefault(); terminaCorsa()" class="flex-1 bg-red-600 text-white font-bold py-3 px-4 rounded-xl shadow-md active:bg-red-700 transition">
                <i class="fa-solid fa-stop mr-2"></i>Termina
            </button>
        </div>
        <button type="button" onclick="apriSegnalazione()" class="w-full mt-3 text-red-500 text-sm font-semibold active:text-red-700">
            <i class="fa-solid fa-triangle-exclamation mr-1"></i> Segnala un guasto
        </button>
    </div>

    <nav class="bg-white border-t border-gray-200 flex justify-around p-2 pb-safe z-20 h-[60px]">
        <button class="flex flex-col items-center justify-center w-full text-blue-600">
            <i class="fa-solid fa-map-location-dot text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Mappa</span>
        </button>
        <button onclick="showToast('Storico corse: in arrivo nel prossimo sprint!')" class="flex flex-col items-center justify-center w-full text-gray-400 active:text-blue-600">
            <i class="fa-solid fa-route text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Corse</span>
        </button>
        <button onclick="apriProfilo()" class="flex flex-col items-center justify-center w-full text-gray-400 active:text-blue-600">
            <i class="fa-solid fa-user-gear text-xl mb-1"></i><span class="text-[10px] font-bold uppercase tracking-wider">Profilo</span>
        </button>
    </nav>

    <!-- ===== MODAL CHAT ASSISTENZA (IF-U09) ===== -->
    <div id="chat-modal" class="bottom-sheet fixed bottom-[60px] left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-[700] flex flex-col" style="height: 70vh;">
        <div class="flex justify-between items-center p-4 border-b">
            <h2 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-headset mr-2 text-blue-600"></i>Assistenza</h2>
            <button type="button" onclick="closeModalSimple('chat-modal')" class="text-gray-400 text-xl"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="chat-messaggi" class="flex-grow overflow-y-auto p-4 space-y-2 bg-gray-50"></div>
        <div class="p-3 border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Scrivi un messaggio..." class="flex-1 border border-gray-300 py-2 px-3 rounded-full text-sm focus:outline-none focus:border-blue-500" onkeydown="if(event.key==='Enter')inviaMessaggioChat()">
            <button type="button" onclick="inviaMessaggioChat()" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ===== MODAL SEGNALAZIONE GUASTO (IF-U10) ===== -->
    <div id="segnalazione-modal" class="bottom-sheet fixed bottom-[60px] left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-[700] p-6 pb-8">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5"></div>
        <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-triangle-exclamation mr-2 text-red-500"></i>Segnala un guasto</h2>
        <label class="text-xs font-bold text-gray-500 uppercase">Tipo di problema</label>
        <select id="segnalazione-categoria" class="w-full border border-gray-300 py-2 px-3 rounded-lg text-sm mb-3 mt-1">
            <option value="FRENI">Freni</option>
            <option value="GOMME">Gomme / Ruote</option>
            <option value="BATTERIA">Batteria</option>
            <option value="TELAIO">Telaio / Struttura</option>
            <option value="VANDALISMO">Vandalismo</option>
            <option value="ALTRO" selected>Altro</option>
        </select>
        <textarea id="segnalazione-descrizione" rows="3" placeholder="Descrivi il problema (es. catena rotta, gomma a terra)" class="w-full border border-gray-300 py-2 px-3 rounded-lg text-sm mb-4"></textarea>
        <button type="button" onclick="inviaSegnalazione()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl active:bg-red-700">Invia segnalazione</button>
        <button type="button" onclick="closeModalSimple('segnalazione-modal')" class="w-full mt-3 text-gray-400 font-medium py-2">Annulla</button>
    </div>

    <!-- ===== MODAL PROFILO / METODO DI PAGAMENTO (IF-U13) ===== -->
    <div id="profilo-modal" class="bottom-sheet fixed bottom-[60px] left-0 right-0 bg-white rounded-t-3xl shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)] z-[700] p-6 pb-8">
        <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-5"></div>
        <h2 class="text-xl font-bold text-gray-800 mb-1"><i class="fa-solid fa-credit-card mr-2 text-blue-600"></i>Metodo di pagamento</h2>
        <p class="text-xs text-gray-400 mb-4">I dati sono salvati in forma sicura (tokenizzati): numero e CVV non vengono memorizzati.</p>
        <input type="text" id="carta-numero" inputmode="numeric" placeholder="Numero carta (es. 4111 1111 1111 1234)" class="w-full border border-gray-300 py-2 px-3 rounded-lg text-sm mb-3">
        <div class="flex gap-3 mb-4">
            <input type="text" id="carta-scadenza" placeholder="MM/AA" class="flex-1 border border-gray-300 py-2 px-3 rounded-lg text-sm">
            <input type="text" id="carta-cvv" inputmode="numeric" placeholder="CVV" maxlength="4" class="w-24 border border-gray-300 py-2 px-3 rounded-lg text-sm">
        </div>
        <div id="carta-salvata" class="hidden mb-4 text-sm text-green-700 bg-green-50 p-2 rounded-lg"></div>
        <button type="button" onclick="salvaCarta()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl active:bg-blue-700">Salva carta</button>
        <button type="button" onclick="closeModalSimple('profilo-modal')" class="w-full mt-3 text-gray-400 font-medium py-2">Chiudi</button>
    </div>

    <script>
        const API_BASE_URL = 'http://192.168.1.32:8000/api';
        const ID_UTENTE_ATTUALE = 35; 

        let map, markers = [];
        let userLocationMarker = null;
        let selectedMezzoId = null;
        
        let activeRideId = null;
        let isPaused = false;
        let timerCostoInterval = null;

        let userLat = 45.4642;
        let userLng = 9.1900;
        let tipoMezzoSelezionato = 'SCOOTER';

        document.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', {zoomControl: false}).setView([userLat, userLng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            map.on('click', () => {
                closeModal('vehicle-modal');
            });
            
            trovaPosizioneUtente();
            caricaMezzi();
            caricaAreeUrbane(); 
            
            setInterval(caricaMezzi, 15000); 
        });

        function trovaPosizioneUtente() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        map.setView([userLat, userLng], 15);
                        if (userLocationMarker) {
                            userLocationMarker.setLatLng([userLat, userLng]);
                        } else {
                            const userIcon = L.divIcon({ className: 'user-location-icon', iconSize: [14, 14] });
                            userLocationMarker = L.marker([userLat, userLng], { icon: userIcon }).addTo(map)
                                .bindPopup("Tu sei qui").openPopup();
                        }
                    },
                    (error) => { showToast("Uso posizione di default (permessi GPS disattivati).", false); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
        }

        function centerMapOnUser() {
            trovaPosizioneUtente();
            map.setView([userLat, userLng], 16);
        }

        function showToast(message, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
            if(modalId === 'vehicle-modal') {
                selectedMezzoId = null;
                document.getElementById('codice-sblocco-input').value = "";
                // ECCO LA CORREZIONE: Ora cerca il nuovo ID 'destinazione-input'
                document.getElementById('destinazione-input').value = "";
                document.getElementById('risultato-preventivo').classList.add('hidden');
            }
        }

        async function caricaAreeUrbane() {
            try {
                const response = await fetch(`${API_BASE_URL}/aree-urbane/`);
                if (!response.ok) return;
                const aree = await response.json();
                aree.forEach(area => {
                    let color = '#ef4444'; // Default Rosso (Divieto)
                    if (area.tipologia === 'PARCHEGGIO') color = '#10b981'; // Verde
                    if (area.tipologia === 'RICARICA') color = '#3b82f6'; // Blu

                    L.circle([area.latitudine, area.longitudine], {
                        color: color, fillColor: color, fillOpacity: 0.2, radius: area.raggio_metri, weight: 2
                    }).addTo(map).bindPopup(`<b>${area.nome_zona}</b><br>${area.tipologia}`);
                });
            } catch (error) { console.error("Errore aree", error); }
        }

        async function caricaMezzi() {
            if (activeRideId !== null) return; 
            try {
                const response = await fetch(`${API_BASE_URL}/mezzi/?solo_disponibili=true`);
                if (!response.ok) return;
                const mezzi = await response.json();
                
                markers.forEach(m => map.removeLayer(m));
                markers = [];

                mezzi.forEach(mezzo => {
                    let iconHtml = '<i class="fa-solid fa-bicycle text-blue-600 bg-white p-2 rounded-full border-2 border-blue-600 shadow-md"></i>';
                    let nomeMezzo = "Bicicletta";

                    if (mezzo.tipo === 'AUTO') {
                        iconHtml = '<i class="fa-solid fa-car text-purple-600 bg-white p-2 rounded-full border-2 border-purple-600 shadow-md"></i>';
                        nomeMezzo = "Automobile";
                    }
                    if (mezzo.tipo === 'SCOOTER') {
                        iconHtml = '<div class="bg-white rounded-full border-2 border-yellow-500 shadow-md flex items-center justify-center" style="width: 30px; height: 30px; font-size: 16px;">🛴</div>';
                        nomeMezzo = "Monopattino Elettrico";
                    }

                    const customIcon = L.divIcon({ html: iconHtml, className: 'custom-div-icon', iconSize: [30, 30], iconAnchor: [15, 15] });
                    const marker = L.marker([mezzo.latitudine, mezzo.longitudine], {icon: customIcon}).addTo(map);
                    
                    marker.on('click', () => {
                        selectedMezzoId = mezzo.id;
                        tipoMezzoSelezionato = mezzo.tipo;

                        // SALVATAGGIO COORDINATE MEZZO PER IL PREVENTIVO
                        window.mezzoSelezionatoLat = mezzo.latitudine;
                        window.mezzoSelezionatoLng = mezzo.longitudine;

                        document.getElementById('modal-title').innerText = nomeMezzo;
                        document.getElementById('modal-type').innerText = `ID Veicolo: #${mezzo.id}`;
                        document.getElementById('modal-battery').innerText = `${mezzo.batteria}%`;
                        document.getElementById('modal-autonomy').innerHTML = `<i class="fa-solid fa-road mr-1"></i>~${mezzo.autonomia_km} km`;
                        
                        document.getElementById('vehicle-modal').classList.add('open');
                        map.setView([mezzo.latitudine - 0.002, mezzo.longitudine], 16);
                    });
                    markers.push(marker);
                });
            } catch (error) {}
        }

        async function calcolaPreventivoDaIndirizzo() {
            let indirizzo = document.getElementById('destinazione-input').value;
            const divRisultato = document.getElementById('risultato-preventivo');
            
            if (!indirizzo) return;
            
            divRisultato.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Ricerca in corso...';
            divRisultato.classList.remove('hidden');

            try {
                const queryRobusta = encodeURIComponent(indirizzo + ", Italia");
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${queryRobusta}`);
                const geoData = await geoRes.json();
                
                if (geoData.length === 0) {
                    divRisultato.innerHTML = "Indirizzo non trovato. Inserisci anche la città (es. Via Roma, Milano).";
                    return;
                }
                
                const lat_dest = parseFloat(geoData[0].lat);
                const lng_dest = parseFloat(geoData[0].lon);

                // UTILIZZO LE COORDINATE DEL MEZZO PER IL CALCOLO!
                const lat_partenza_stima = window.mezzoSelezionatoLat || userLat;
                const lng_partenza_stima = window.mezzoSelezionatoLng || userLng;

                const response = await fetch(`${API_BASE_URL}/corse/stima_preventiva/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        lat_partenza: lat_partenza_stima, 
                        lng_partenza: lng_partenza_stima, 
                        lat_destinazione: lat_dest, 
                        lng_destinazione: lng_dest, 
                        tipo_mezzo: tipoMezzoSelezionato 
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    divRisultato.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span><i class="fa-solid fa-stopwatch mr-1"></i> ~${data.tempo_stimato_minuti} min (${data.distanza_km}km)</span>
                            <span class="font-bold text-lg">${data.costo_stimato}€</span>
                        </div>
                    `;
                }
            } catch (e) { divRisultato.innerHTML = "Errore di connessione."; }
        }

        async function prenotaMezzo() { 
            if (!selectedMezzoId) return;
            try {
                const response = await fetch(`${API_BASE_URL}/mezzi/${selectedMezzoId}/prenota/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ utente: ID_UTENTE_ATTUALE })
                });
                const data = await response.json();
                if (response.ok) {
                    showToast(`Veicolo prenotato! Hai 15 minuti.`);
                    closeModal('vehicle-modal');
                    caricaMezzi();
                } else { showToast(`Errore: ${data.error}`, true); }
            } catch (error) { showToast("Errore di connessione", true); }
        }

        async function sbloccaMezzo() {
            if (!selectedMezzoId) return;

            const codice = document.getElementById('codice-sblocco-input').value.trim();
            if (codice.length !== 6) {
                showToast("Inserisci un codice di 6 caratteri!", true);
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/corse/avvia/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        utente: ID_UTENTE_ATTUALE, 
                        mezzo: selectedMezzoId,
                        codice_sblocco: codice 
                    })
                });
                const data = await response.json();
                
                if (response.ok) {
                    activeRideId = data.id;
                    window.mezzoCorsaAttiva = selectedMezzoId;
                    showToast(`Corsa iniziata! Indossa il casco.`);
                    closeModal('vehicle-modal');
                    caricaMezzi(); 
                    document.getElementById('active-ride-modal').classList.add('open');
                    aggiornaCostoInTempoReale();
                    timerCostoInterval = setInterval(aggiornaCostoInTempoReale, 60000);
                } else { 
                    showToast(`${data.error}`, true); 
                }
            } catch (error) { showToast("Errore di connessione", true); }
        }

        async function aggiornaCostoInTempoReale() {
            if (!activeRideId || isPaused) return;
            try {
                const response = await fetch(`${API_BASE_URL}/corse/${activeRideId}/costo_corrente/`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('ride-cost').innerText = `${data.costo_stimato_corrente}€`;
                    document.getElementById('ride-time').innerText = `${data.minuti_trascorsi} min`;
                }
            } catch (e) { console.error("Errore timer", e); }
        }

        async function togglePausa() {
            const action = isPaused ? 'sblocco_temporaneo' : 'blocco_temporaneo';
            try {
                const response = await fetch(`${API_BASE_URL}/corse/${activeRideId}/${action}/`, { method: 'POST' });
                if (response.ok) {
                    isPaused = !isPaused;
                    const btn = document.getElementById('btn-pausa');
                    const text = document.getElementById('text-pausa');
                    const icon = document.getElementById('icon-pausa');

                    if (isPaused) {
                        btn.classList.replace('bg-yellow-400', 'bg-blue-100');
                        btn.classList.replace('text-yellow-900', 'text-blue-800');
                        text.innerText = 'Riprendi';
                        icon.classList.replace('fa-pause', 'fa-play');
                        showToast('Mezzo bloccato. Pausa attiva.');
                    } else {
                        btn.classList.replace('bg-blue-100', 'bg-yellow-400');
                        btn.classList.replace('text-blue-800', 'text-yellow-900');
                        text.innerText = 'Pausa';
                        icon.classList.replace('fa-play', 'fa-pause');
                        showToast('Mezzo sbloccato. Puoi ripartire.');
                    }
                }
            } catch (e) { showToast("Errore durante la pausa", true); }
        }

        async function terminaCorsa() {
            if (!activeRideId) return;
            const center = map.getCenter();
            const codicePromo = document.getElementById('codice-promo-input').value.trim();

            const payload = { latitudine: center.lat, longitudine: center.lng };
            if (codicePromo) payload.codice_promo = codicePromo;

            try {
                const response = await fetch(`${API_BASE_URL}/corse/${activeRideId}/termina/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert(`✅ CORSA TERMINATA!\n\nHai speso: ${data.costo_totale}€\nGrazie per aver viaggiato con noi.\nTi abbiamo inviato la ricevuta via email.`);
                    
                    clearInterval(timerCostoInterval);
                    activeRideId = null;
                    isPaused = false;
                    document.getElementById('codice-promo-input').value = "";
                    pulisciPercorso();
                    closeModal('active-ride-modal');
                    caricaMezzi(); 
                } else {
                    showToast(`⛔ ATTENZIONE: ${data.error}`, true);
                }
            } catch (error) { showToast("Errore di connessione", true); }
        }

        // ===================== BLOCCO 3 - FUNZIONI FRONTEND =====================
        let routePolyline = null;
        let qrScanner = null;
        let chatInterval = null;

        function closeModalSimple(modalId) {
            document.getElementById(modalId).classList.remove('open');
            if (modalId === 'chat-modal' && chatInterval) { clearInterval(chatInterval); chatInterval = null; }
        }

        function pulisciPercorso() {
            if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
        }

        // --- Geocoding riutilizzabile (Nominatim) ---
        async function geocodeIndirizzo(indirizzo) {
            const q = encodeURIComponent(indirizzo + ", Italia");
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
            const data = await res.json();
            if (!data.length) return null;
            return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }

        // --- IF-U06: percorso più breve ---
        async function mostraPercorso() {
            const indirizzo = document.getElementById('destinazione-input').value;
            if (!indirizzo) { showToast("Inserisci prima una destinazione.", true); return; }
            const dest = await geocodeIndirizzo(indirizzo);
            if (!dest) { showToast("Indirizzo non trovato.", true); return; }

            const origine = [window.mezzoSelezionatoLat || userLat, window.mezzoSelezionatoLng || userLng];
            try {
                const response = await fetch(`${API_BASE_URL}/routing/percorso/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ origine: origine, destinazione: [dest.lat, dest.lng], tipo_mezzo: tipoMezzoSelezionato })
                });
                if (!response.ok) { showToast("Impossibile calcolare il percorso.", true); return; }
                const data = await response.json();
                pulisciPercorso();
                routePolyline = L.polyline(data.punti, { color: '#4f46e5', weight: 5, opacity: 0.8 }).addTo(map);
                map.fitBounds(routePolyline.getBounds(), { padding: [50, 50] });
                showToast(`Percorso: ${data.distanza_km} km, ~${data.durata_minuti} min`);
            } catch (e) { showToast("Errore di connessione.", true); }
        }

        // --- IF-U07: meteo e mezzo consigliato ---
        async function mostraMeteo() {
            try {
                const response = await fetch(`${API_BASE_URL}/meteo/suggerimento/`);
                const data = await response.json();
                const icone = { SOLE: '☀️', NUVOLOSO: '☁️', PIOGGIA: '🌧️', VENTO: '💨' };
                const nomiMezzo = { BICI: 'Bicicletta', SCOOTER: 'Monopattino', AUTO: 'Auto' };
                alert(`${icone[data.condizione] || ''} Meteo: ${data.condizione} (${data.temperatura_c}°C)\n\nMezzo consigliato: ${nomiMezzo[data.mezzo_consigliato]}\n${data.motivazione}`);
            } catch (e) { showToast("Meteo non disponibile.", true); }
        }

        // --- IF-U12: scansione QR Code ---
        function avviaScansioneQR() {
            const reader = document.getElementById('qr-reader');
            if (qrScanner) { fermaScansioneQR(); return; }
            reader.classList.remove('hidden');
            qrScanner = new Html5Qrcode("qr-reader");
            qrScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 200 },
                (testo) => {
                    const codice = testo.replace(/\D/g, '').slice(0, 6);
                    document.getElementById('codice-sblocco-input').value = codice;
                    showToast("QR letto: codice inserito.");
                    fermaScansioneQR();
                },
                () => {}
            ).catch(() => { showToast("Fotocamera non disponibile, usa il codice manuale.", true); reader.classList.add('hidden'); qrScanner = null; });
        }
        function fermaScansioneQR() {
            if (qrScanner) {
                qrScanner.stop().then(() => { qrScanner.clear(); qrScanner = null; document.getElementById('qr-reader').classList.add('hidden'); }).catch(() => {});
            }
        }

        // --- IF-U09: chat assistenza ---
        function apriChat() {
            document.getElementById('chat-modal').classList.add('open');
            caricaChat();
            if (chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(caricaChat, 4000);
        }
        async function caricaChat() {
            try {
                const response = await fetch(`${API_BASE_URL}/chat/?utente=${ID_UTENTE_ATTUALE}`);
                if (!response.ok) return;
                const messaggi = await response.json();
                const box = document.getElementById('chat-messaggi');
                box.innerHTML = messaggi.map(m => {
                    const mio = m.autore === 'UTENTE';
                    const bg = mio ? 'bg-blue-600 text-white ml-auto' : (m.autore === 'BOT' ? 'bg-gray-200 text-gray-800' : 'bg-green-100 text-green-900');
                    const etichetta = mio ? '' : `<div class="text-[10px] font-bold opacity-60 mb-0.5">${m.autore}</div>`;
                    return `<div class="max-w-[80%] ${bg} rounded-2xl px-3 py-2 text-sm">${etichetta}${m.messaggio}</div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
            } catch (e) {}
        }
        async function inviaMessaggioChat() {
            const input = document.getElementById('chat-input');
            const testo = input.value.trim();
            if (!testo) return;
            input.value = "";
            try {
                await fetch(`${API_BASE_URL}/chat/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ utente: ID_UTENTE_ATTUALE, messaggio: testo })
                });
                caricaChat();
            } catch (e) { showToast("Messaggio non inviato.", true); }
        }

        // --- IF-U10: segnalazione guasto ---
        function apriSegnalazione() {
            document.getElementById('segnalazione-modal').classList.add('open');
        }
        async function inviaSegnalazione() {
            const categoria = document.getElementById('segnalazione-categoria').value;
            const descrizione = document.getElementById('segnalazione-descrizione').value.trim();
            if (!descrizione) { showToast("Descrivi il problema.", true); return; }
            const mezzoId = window.mezzoCorsaAttiva || selectedMezzoId;
            if (!mezzoId) { showToast("Nessun mezzo associato.", true); return; }
            try {
                const response = await fetch(`${API_BASE_URL}/segnalazioni/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ utente: ID_UTENTE_ATTUALE, mezzo: mezzoId, categoria: categoria, descrizione: descrizione })
                });
                if (response.ok) {
                    showToast("Segnalazione inviata. Grazie!");
                    document.getElementById('segnalazione-descrizione').value = "";
                    closeModalSimple('segnalazione-modal');
                } else { showToast("Errore nell'invio.", true); }
            } catch (e) { showToast("Errore di connessione.", true); }
        }

        // --- IF-U13: salvataggio metodo di pagamento ---
        function apriProfilo() {
            document.getElementById('profilo-modal').classList.add('open');
        }
        async function salvaCarta() {
            const numero = document.getElementById('carta-numero').value.trim();
            const scadenza = document.getElementById('carta-scadenza').value.trim();
            if (!numero || !scadenza) { showToast("Inserisci numero e scadenza.", true); return; }
            try {
                const response = await fetch(`${API_BASE_URL}/utenti/${ID_UTENTE_ATTUALE}/salva_carta/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ numero: numero, scadenza: scadenza })
                });
                const data = await response.json();
                if (response.ok) {
                    const box = document.getElementById('carta-salvata');
                    box.innerHTML = `<i class="fa-solid fa-check-circle mr-1"></i> Salvata: ${data.circuito} ${data.carta}`;
                    box.classList.remove('hidden');
                    document.getElementById('carta-numero').value = "";
                    document.getElementById('carta-cvv').value = "";
                    showToast("Carta salvata in sicurezza.");
                } else { showToast(data.error || "Carta non valida.", true); }
            } catch (e) { showToast("Errore di connessione.", true); }
        }
    </script>
</body>
</html>
